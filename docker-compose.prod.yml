version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: xinmeng-ai
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-changeme-jwt-secret}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-changeme-admin-secret}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - DB_PATH=/app/data/app.db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
