version: "3.8"

services:
  app:
    build:
      context: .
      target: production
    image: xinmeng-ai:latest
    container_name: xinmeng-ai
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      # Only mount data directories, NOT the source code
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
