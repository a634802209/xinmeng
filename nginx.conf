# XinMeng AI Nginx 配置
# 放置到 /etc/nginx/sites-available/xinmeng-ai，然后软链接到 sites-enabled

# 上游 Node.js 应用（Docker 内部网络）
upstream app_backend {
    server app:3001;
}

# HTTP - 自动跳转 HTTPS
server {
    listen 80;
    server_name your-domain.com;

    # 用于 certbot 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 证书路径（certbot 会自动配置）
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 限制请求体大小（上传文件）
    client_max_body_size 20M;

    # 静态文件直接由 Nginx 提供（不经过 Node.js）
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 上传文件
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # API 请求反向代理到 Node.js
    location /api/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 传递真实 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 限制 API 请求体大小
        client_max_body_size 10M;
    }

    # 健康检查
    location /api/health {
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # 日志
    access_log /var/log/nginx/xinmeng-ai-access.log;
    error_log /var/log/nginx/xinmeng-ai-error.log;
}
