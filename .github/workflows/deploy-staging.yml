name: Deploy to Staging

on:
  push:
    branches: [dev, develop]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          source: 'dist,api,package.json,docker-compose.prod.yml,Dockerfile,nginx.conf,.env.example,deploy.sh,backup.sh,monitor.sh'
          target: '/opt/xinmeng-ai-staging'
          rm: true

      - name: Restart staging services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          script: |
            cd /opt/xinmeng-ai-staging
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "JWT_SECRET=$(openssl rand -base64 32)" >> .env
              echo "FRONTEND_URL=https://staging.${{ secrets.STAGING_HOST }}" >> .env
              echo "NODE_ENV=staging" >> .env
            fi
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up --build -d
