name: Deploy to Tencent Cloud Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          cp -r dist deploy-package/
          cp -r api deploy-package/
          cp package.json deploy-package/
          cp package-lock.json deploy-package/
          cp docker-compose.prod.yml deploy-package/
          cp Dockerfile deploy-package/
          cp nginx.conf deploy-package/
          cp .env.example deploy-package/
          cp deploy.sh deploy-package/
          cp backup.sh deploy-package/
          cp monitor.sh deploy-package/
          cp loki-config.yml deploy-package/
          cp promtail-config.yml deploy-package/
          tar -czf xinmeng-ai-prod.tar.gz -C deploy-package .

      - name: Deploy to production server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: 'xinmeng-ai-prod.tar.gz'
          target: '/tmp'

      - name: Extract and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            DEPLOY_DIR="/opt/xinmeng-ai"
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            # Backup current deployment
            if [ -d "$DEPLOY_DIR/dist" ]; then
              BACKUP_DIR="/opt/backups/xinmeng-ai-$(date +%Y%m%d-%H%M%S)"
              mkdir -p /opt/backups
              cp -r $DEPLOY_DIR "$BACKUP_DIR"
              echo "Backup created at $BACKUP_DIR"
            fi

            # Extract new deployment
            tar -xzf /tmp/xinmeng-ai-prod.tar.gz -C $DEPLOY_DIR
            rm -f /tmp/xinmeng-ai-prod.tar.gz

            # Ensure .env exists
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "JWT_SECRET=$(openssl rand -base64 32)" >> .env
              echo "ADMIN_JWT_SECRET=$(openssl rand -base64 32)" >> .env
              echo "FRONTEND_URL=https://${{ secrets.SERVER_HOST }}" >> .env
              echo "NODE_ENV=production" >> .env
              echo "PORT=3001" >> .env
            fi

            # Ensure data directories exist
            mkdir -p data public/uploads logs ssl

            # Restart services
            docker-compose -f docker-compose.prod.yml down || true
            docker-compose -f docker-compose.prod.yml up --build -d

            # Health check
            sleep 10
            if curl -sf http://localhost:3001/api/health > /dev/null; then
              echo "Deployment successful!"
            else
              echo "Health check failed!"
              exit 1
            fi

            # Cleanup old images
            docker image prune -f
            docker system prune -f --volumes

            # Keep only last 5 backups
            ls -t /opt/backups/xinmeng-ai-* 2>/dev/null | tail -n +6 | xargs -r rm -rf
